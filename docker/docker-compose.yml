version: "3.8"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - SCORING_SERVICE_URL=http://scoring:8001
    depends_on:
      - scoring
    restart: unless-stopped

  scoring:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scoring
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    restart: unless-stopped
