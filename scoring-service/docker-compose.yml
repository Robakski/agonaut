version: "3.8"

services:
  scoring:
    build: .
    ports:
      - "8001:8001"
    environment:
      - PHALA_API_KEY=${PHALA_API_KEY}
      - SCORING_MODEL=${SCORING_MODEL:-deepseek-chat}
      - SCORER_PRIVATE_KEY=${SCORER_PRIVATE_KEY}
      - SCORING_ORACLE=${SCORING_ORACLE}
      - RPC_URL=${RPC_URL:-https://sepolia.base.org}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
