version: "3.8"

# Phala Cloud CVM deployment
# Image is built by GitHub Actions and pushed to GHCR
# Fallback: inline build from Dockerfile (for local dev / non-GHCR)

services:
  scorer:
    image: ghcr.io/robakski/agonaut-scorer:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PHALA_API_KEY=${PHALA_API_KEY}
      - SCORING_MODEL=${SCORING_MODEL:-deepseek-chat}
      - SCORER_PRIVATE_KEY=${SCORER_PRIVATE_KEY}
      - SCORING_ORACLE=${SCORING_ORACLE}
      - RPC_URL=${RPC_URL:-https://sepolia.base.org}
      - CHAIN_ID=${CHAIN_ID:-84532}
    volumes:
      - scorer-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  scorer-data:
