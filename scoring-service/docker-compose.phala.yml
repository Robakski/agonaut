# Agonaut Scoring TEE — Phala Cloud CVM Deployment
# SHA-384 of this file is embedded in RTMR3 by Intel TDX hardware

services:
  scorer:
    image: python:3.11-slim
    ports:
      - "8001:8001"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - scorer-data:/app/data
    environment:
      - PHALA_API_KEY=${PHALA_API_KEY}
      - PHALA_API_URL=https://api.redpill.ai/v1
      - SCORING_MODEL=deepseek/deepseek-chat-v3-0324
      - SCORER_PRIVATE_KEY=${SCORER_PRIVATE_KEY}
      - SCORING_ORACLE=${SCORING_ORACLE}
      - SCORING_HMAC_SECRET=${SCORING_HMAC_SECRET}
      - RPC_URL=${RPC_URL:-https://sepolia.base.org}
      - SCORING_DB_PATH=/app/data/scoring.db
    command: >
      bash -c "
        apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1 &&
        pip install --no-cache-dir fastapi==0.115.12 'uvicorn[standard]==0.34.2' openai==1.68.2 cryptography==44.0.2 web3==7.9.0 pydantic==2.11.1 'httpx>=0.27.0' > /dev/null 2>&1 &&
        git clone --depth 1 https://github.com/Robakski/agonaut.git /tmp/agonaut &&
        cp /tmp/agonaut/scoring-service/*.py /app/ &&
        cp /tmp/agonaut/scoring-service/requirements.txt /app/ &&
        rm -rf /tmp/agonaut &&
        cd /app &&
        echo 'Starting Agonaut TEE Scoring Service...' &&
        uvicorn api:app --host 0.0.0.0 --port 8001 --workers 1
      "
    restart: unless-stopped

volumes:
  scorer-data:
    driver: local
